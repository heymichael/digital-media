services:
  local-postgres:
    image: ankane/pgvector:latest
    container_name: digital-media-local-pg
    ports:
      - "5437:5432"
    environment:
      POSTGRES_DB: digital_media_local
      POSTGRES_USER: media_local
      POSTGRES_PASSWORD: localdev
    volumes:
      - digital-media-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U media_local -d digital_media_local"]
      interval: 2s
      timeout: 3s
      retries: 30

volumes:
  digital-media-pgdata:
